                    <div class="form-group">

                    <button type="submit" class="submit-btn">
                        Submit Application
                    </button>

                <script>
document.getElementById("careerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = {
        fullName: document.getElementById("fullName").value,
        email: document.querySelector('[name="email"]').value,
        jobType: document.querySelector('input[name="jobType"]:checked').value,
        targetPost: document.getElementById("targetPost").value,
        portfolioLink: document.getElementById("portfolioLink").value
    };

    try {
        const response = await fetch("http://localhost:5000/api/career", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (result.success) {
            alert("Application Submitted Successfully!");
            document.getElementById("careerForm").reset();
        } else {
            alert(result.message);
        }
    } catch (error) {
        console.error(error);
        alert("Backend server not running.");
    }
});
</script>

    <script src="script.js"></script>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const toggleIcon = themeToggle.querySelector('i');

        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            if(toggleIcon) toggleIcon.className = 'fa-solid fa-sun';
        } else {
            document.body.classList.remove("dark-mode");
            if(toggleIcon) toggleIcon.className = 'fa-solid fa-moon';
        }

        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark-mode')) {
                document.body.classList.remove('dark-mode');
                if(toggleIcon) toggleIcon.className = 'fa-solid fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark-mode');
                if(toggleIcon) toggleIcon.className = 'fa-solid fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>

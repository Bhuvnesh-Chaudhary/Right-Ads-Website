<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Join Right Ads</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: #eeeff0; color: #f8fafc; font-family: sans-serif; margin: 0; animation: pageFadeIn 0.5s ease-out forwards;">
    <header style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: #111827;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: bold; font-size: 20px;">
                
                <img src="images/logo.jpg" alt="Right Ads Logo" style="height: 80px; width: auto; object-fit: contain; border-radius: 6px;">
                
            </a>
            <a href="index.html" style="color: #3b82f6; text-decoration: none; font-weight: 500;">← Back to Home</a>
        </div>
    </header>

    <main style="max-width: 900px; margin: 60px auto; padding: 0 20px;">
        
        <div style="text-align: center; margin-bottom: 50px;">
            <span style="color: #3b82f6; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; font-weight: 700;">Join Our Team</span>
            <h1 style="font-size: 38px; margin: 10px 0 20px 0;">Build Your Future With Us</h1>
            <p style="color: #94a3b8; max-width: 600px; margin: 0 auto; line-height: 1.6;">We are always on the lookout for talented and passionate individuals. Select your profile below and apply!</p>
        </div>

        <div class="career-card" style="background: linear-gradient(135deg, #1e293b 0%, #111827 100%); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05);">
            <form action="#" method="POST">
                
                <div style="display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <label style="display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px;">Full Name</label>
                        <input type="text" placeholder="Your Name" required style="width: 100%; padding: 12px; background: #0b0f19; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; box-sizing: border-box;">
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label style="display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px;">Email Address</label>
                        <input type="email" placeholder="name@example.com" required style="width: 100%; padding: 12px; background: #0b0f19; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; box-sizing: border-box;">
                    </div>
                </div>

                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 12px; color: #94a3b8; font-size: 14px;">Job Type</label>
                    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                        
                        <label style="flex: 1; background: #0b0f19; border: 2px solid #3b82f6; padding: 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;">
                            <input type="radio" name="job_type" value="intern" checked style="accent-color: #3b82f6; transform: scale(1.2);">
                            <div>
                                <strong style="display: block; color: #fff;">As an Intern (Internship)</strong>
                                <span style="font-size: 12px; color: #64748b;">Learning + Live Projects</span>
                            </div>
                        </label>

                        <label style="flex: 1; background: #0b0f19; border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;">
                            <input type="radio" name="job_type" value="fulltime" style="accent-color: #3b82f6; transform: scale(1.2);">
                            <div>
                                <strong style="display: block; color: #fff;">Full-Time Job</strong>
                                <span style="font-size: 12px; color: #64748b;">Experienced / Permanent Role</span>
                            </div>
                        </label>

                    </div>
                </div>

                <!-- SYSTEM UPDATED POST SELECTION DROPDOWN (FULL LIST) -->
<!-- DROPDOWN WITH PITCH BLACK HEADINGS BACKGROUND -->
<div style="margin-bottom: 24px;">
    <label style="display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px;">Select Target Post</label>
    <select required style="width: 100%; padding: 14px; background: #111827; color: #f8fafc; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 15px;">
        <option value="" disabled selected style="color: #94a3b8; background: #111827;">-- Choose a Post --</option>
        
        <optgroup label="📂 DEVELOPMENT & TECH" style="color: #3b82f6; font-weight: bold; background: #0f172a; font-style: normal;">
            <option value="frontend-dev" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Frontend Web Developer</option>
            <option value="fullstack-dev" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Full-Stack Developer (MERN/PHP)</option>
            <option value="wordpress-dev" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;WordPress & Shopify Developer</option>
            <option value="app-dev" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Mobile App Developer (Flutter/React Native)</option>
        </optgroup>
        
        <optgroup label="🎨 CREATIVE & DESIGN" style="color: #eab308; font-weight: bold; background: #0f172a; font-style: normal;">
            <option value="ui-ux" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;UI/UX Designer</option>
            <option value="graphic-design" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Graphic Designer</option>
            <option value="video-editor" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Video Editor & Motion Graphics Artist</option>
            <option value="animator" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;3D/2D Animator</option>
        </optgroup>
        
        <optgroup label="📈 DIGITAL MARKETING" style="color: #10b981; font-weight: bold; background: #0f172a; font-style: normal;">
            <option value="seo-expert" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;SEO Specialist / Link Builder</option>
            <option value="google-ads" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Google Ads & PPC Expert</option>
            <option value="performance-marketer" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Performance Marketer / Meta Ads Specialist</option>
            <option value="social-media" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Social Media Manager (SMM)</option>
            <option value="email-marketing" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Email Marketing Specialist</option>
        </optgroup>
        
        <optgroup label="✍️ CONTENT & ANALYTICS" style="color: #a855f7; font-weight: bold; background: #1146c4; font-style: normal;">
            <option value="content-writer" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Content Writer & Copywriter</option>
            <option value="data-analyst" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Data Analyst / SEO Analytics Executive</option>
        </optgroup>
        
        <optgroup label="💼 MANAGEMENT & GROWTH" style="color: #f97316; font-weight: bold; background: #0f172a; font-style: normal;">
            <option value="project-manager" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Project Manager / Account Manager</option>
            <option value="bde" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;Business Development Executive (BDE / Sales)</option>
            <option value="hr-recruiter" style="color: #ffffff; background: #1e293b;">&nbsp;&nbsp;HR Recruiter / Admin</option>
        </optgroup>
    </select>
</div>

                <div style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px;">Paste Link to Resume / Portfolio</label>
                    <input type="url" placeholder="Google Drive or LinkedIn link" style="width: 100%; padding: 12px; background: #0b0f19; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; box-sizing: border-box;">
                </div>

                <button type="submit" style="width: 100%; padding: 14px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.3s;" onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'">
                    Submit Application
                </button>

            </form>
        </div>

    </main>

</body>
</html>

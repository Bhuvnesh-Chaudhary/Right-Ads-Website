<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Join Right Ads</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.career-page {
            font-family: sans-serif;
            margin: 0;
            animation: pageFadeIn 0.5s ease-out forwards;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- LIGHT MODE --- */
        body.career-page {
            background-color: #f8fafc;
            color: #111827;
        }

        .career-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 15px 20px;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .back-home-btn {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
        }

        .main-content {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .section-intro {
            text-align: center;
            margin-bottom: 50px;
        }

        .eyebrow-tag {
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
            font-weight: 700;
        }

        .main-title {
            font-size: 38px;
            margin: 10px 0 20px 0;
            color: #111827;
        }

        .sub-text {
            color: #64748b;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .career-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            padding: 40px;
            border-radius: 24px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .form-col-50 {
            flex: 1;
            min-width: 250px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: #f8fafc;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            color: #111827;
            outline: none;
            font-size: 15px;
        }

        /* Dropdown Setup Fix */
        .form-select {
            width: 100%;
            padding: 14px;
            background-color: #f8fafc !important;
            color: #111827 !important;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
        }

        .form-select optgroup {
            background-color: #ffffff !important;
            color: #2563eb !important;
            font-weight: bold;
            font-style: normal;
        }

        .form-select option {
            background-color: #ffffff !important;
            color: #111827 !important;
        }

        .radio-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-label-block {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-label-block:has(input:checked) {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .radio-title {
            display: block;
            color: #111827;
            font-weight: 700;
        }

        .radio-desc {
            font-size: 12px;
            color: #64748b;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* --- DARK MODE RULES --- */
        body.dark-mode {
            background-color: #0b0f19;
            color: #f8fafc;
        }

        body.dark-mode .career-header {
            background-color: #111827;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        body.dark-mode .back-home-btn {
            color: #60a5fa;
        }

        body.dark-mode .main-title {
            color: #ffffff;
        }

        body.dark-mode .career-card {
            background: linear-gradient(135deg, #1e293b 0%, #111827 100%);
            border: 1px solid rgba(255,255,255,0.08);
        }

        body.dark-mode .form-label {
            color: #94a3b8;
        }

        body.dark-mode .form-input {
            background: #0b0f19;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
        }

        /* Dark Mode Target Dropdown Fix */
        body.dark-mode .form-select {
            background-color: #111827 !important;
            color: #f8fafc !important;
            border: 1px solid rgba(255,255,255,0.1);
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
        }

        body.dark-mode .form-select optgroup {
            background-color: #111827 !important;
            color: #60a5fa !important;
        }

        body.dark-mode .form-select option {
            background-color: #1f2937 !important;
            color: #ffffff !important;
        }

        body.dark-mode .radio-label-block {
            background: #0b0f19;
            border: 1px solid rgba(255,255,255,0.1);
        }

        body.dark-mode .radio-label-block:has(input:checked) {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        body.dark-mode .radio-title {
            color: #ffffff;
        }

        body.dark-mode .radio-desc {
            color: #94a3b8;
        }

        body.dark-mode .submit-btn {
            background: #3b82f6;
        }
    </style>
</head>

<body class="career-page">

    <header class="career-header">
        <div class="header-container">
            <a href="index.html" class="logo-link">
                <img src="images/logo.jpg" alt="Right Ads Logo" style="height: 80px; width: auto; object-fit: contain; border-radius: 6px;">
            </a>
            <a href="index.html" class="back-home-btn">← Back to Home</a>
        </div>
    </header>

    <main class="main-content">
        
        <div class="section-intro">
            <span class="eyebrow-tag">Join Our Team</span>
            <h1 class="main-title">Build Your Future With Us</h1>
            <p class="sub-text">We are always on the lookout for talented and passionate individuals. Select your profile below and apply!</p>
        </div>

        <div class="career-card">
            <form action="#" method="POST">
                
                <div class="form-row">
                    <div class="form-col-50">
                        <label class="form-label">Full Name</label>
                        <input type="text" placeholder="Your Name" required class="form-input">
                    </div>
                    <div class="form-col-50">
                        <label class="form-label">Email Address</label>
                        <input type="email" placeholder="name@example.com" required class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Job Type</label>
                    <div class="radio-grid">
                        <label class="radio-label-block">
                            <input type="radio" name="job_type" value="intern" checked style="accent-color: #2563eb; transform: scale(1.2);">
                            <div>
                                <strong class="radio-title">As an Intern (Internship)</strong>
                                <span class="radio-desc">Learning + Live Projects</span>
                            </div>
                        </label>

                        <label class="radio-label-block">
                            <input type="radio" name="job_type" value="fulltime" style="accent-color: #2563eb; transform: scale(1.2);">
                            <div>
                                <strong class="radio-title">Full-Time Job</strong>
                                <span class="radio-desc">Experienced / Permanent Role</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Select Target Post</label>
                    <select required class="form-select">
                        <option value="" disabled selected>-- Choose a Post --</option>
                        
                        <optgroup label=" DEVELOPMENT & TECH">
                            <option value="frontend-dev">Frontend Web Developer</option>
                            <option value="fullstack-dev">Full-Stack Developer (MERN/PHP)</option>
                            <option value="wordpress-dev">WordPress & Shopify Developer</option>
                            <option value="app-dev">Mobile App Developer (Flutter/React Native)</option>
                        </optgroup>
                        
                        <optgroup label=" CREATIVE & DESIGN">
                            <option value="ui-ux">UI/UX Designer</option>
                            <option value="graphic-design">Graphic Designer</option>
                            <option value="video-editor">Video Editor & Motion Graphics Artist</option>
                            <option value="animator">3D/2D Animator</option>
                        </optgroup>
                        
                        <optgroup label=" DIGITAL MARKETING">
                            <option value="seo-expert">SEO Specialist / Link Builder</option>
                            <option value="google-ads">Google Ads & PPC Expert</option>
                            <option value="performance-marketer">Performance Marketer / Meta Ads Specialist</option>
                            <option value="social-media">Social Media Manager (SMM)</option>
                            <option value="email-marketing">Email Marketing Specialist</option>
                        </optgroup>
                        
                        <optgroup label=" CONTENT & ANALYTICS">
                            <option value="content-writer">Content Writer & Copywriter</option>
                            <option value="data-analyst">Data Analyst / SEO Analytics Executive</option>
                        </optgroup>
                        
                        <optgroup label=" MANAGEMENT & GROWTH">
                            <option value="project-manager">Project Manager / Account Manager</option>
                            <option value="bde">Business Development Executive (BDE / Sales)</option>
                            <option value="hr-recruiter">HR Recruiter / Admin</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Paste Link to Resume / Portfolio</label>
                    <input type="url" placeholder="Google Drive or LinkedIn link" class="form-input">
                </div>

                <button type="submit" class="submit-btn">
                    Submit Application
                </button>

            </form>
        </div>

    </main>
    <script src="script.js"></script>

    <script>
        if(localStorage.getItem("theme") === "dark"){
            document.body.classList.add("dark-mode");
        }
    </script>
</body>
</html>

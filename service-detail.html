<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details - Right Ads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body.dark-mode {
    background: #0f172a !important;
    color: #f8fafc !important;
}

body.dark-mode .nav-placeholder,
body.dark-mode .features-box,
body.dark-mode .sticky-media-wrapper,
body.dark-mode .lead-capture-form-card {
    background: #1e293b !important;
    border-color: #334155 !important;
}

body.dark-mode .service-lead-text,
body.dark-mode .feature-item,
body.dark-mode .form-label-text {
    color: #cbd5e1 !important;
}

body.dark-mode .service-title,
body.dark-mode .form-heading {
    color: white !important;
}

body.dark-mode .form-input-field,
body.dark-mode .form-textarea-box {
    background: #0f172a !important;
    color: white !important;
    border-color: #334155 !important;
}

body.dark-mode #form-service-name {
    background: #334155 !important;
    color: white !important;
}
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #ffffff; color: var(--text-dark); line-height: 1.6; }
        .nav-placeholder { width: 100%; height: 80px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 max(20px, 5%); }
        .back-home-link { color: var(--primary-color); text-decoration: none; font-weight: 600; text-underline-offset: 4px; }
        .back-home-link:hover { text-decoration: underline; }
        
        .service-detail-container { display: table; width: 100%; max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .left-content-column { display: table-cell; width: 60%; vertical-align: top; padding-right: 5%; }
        .right-media-column { display: table-cell; width: 40%; vertical-align: top; }
        
        .service-badge { display: inline-block; color: var(--primary-color); background-color: rgba(37, 99, 235, 0.1); padding: 6px 14px; border-radius: 50px; font-weight: 600; font-size: 13px; text-transform: uppercase; margin-bottom: 20px; }
        .service-title { font-size: 38px; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        .service-lead-text { font-size: 18px; color: var(--text-muted); margin-bottom: 30px; }
        
        .features-box { margin: 35px 0; background: var(--bg-light); border-radius: 16px; padding: 25px; border: 1px solid var(--border-color); }
        .features-box h3 { margin-bottom: 15px; font-size: 18px; }
        .feature-item { margin-bottom: 12px; display: flex; align-items: flex-start; gap: 10px; color: var(--text-muted); font-size: 15px; }
        .feature-icon { color: var(--primary-color); font-weight: bold; }
        
        .sticky-media-wrapper { position: sticky; top: 40px; background: var(--bg-light); border-radius: 24px; padding: 30px; border: 1px solid var(--border-color); text-align: center; }
        .premium-service-mockup { width: 100%; height: 240px; object-fit: cover; border-radius: 16px; margin-bottom: 30px; filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.05)); }
        
        /* Form Styling */
        .lead-capture-form-card { background: #ffffff; border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; text-align: left; }
        .form-heading { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .form-group-block { margin-bottom: 20px; }
        .form-label-text { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .form-input-field, .form-dropdown-select, .form-textarea-box { width: 100%; padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 15px; background-color: var(--bg-light); outline: none; }
        .form-input-field:focus, .form-dropdown-select:focus, .form-textarea-box:focus { border-color: var(--primary-color); background-color: #ffffff; }
        .submit-proposal-btn { width: 100%; padding: 16px; background-color: var(--primary-color); color: #ffffff; border: none; border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .submit-proposal-btn:hover { background-color: var(--primary-hover); }
        
        @media (max-width: 968px) {
            .left-content-column, .right-media-column { display: block; width: 100%; padding-right: 0; }
            .sticky-media-wrapper { position: relative; top: 0; margin-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="nav-placeholder">
        <a href="index.html" class="back-home-link">← Back to Home</a>
    </div>

    <div class="service-detail-container">
        <div class="left-content-column">
            <span class="service-badge" id="srv-badge">Category</span>
            <h1 class="service-title" id="srv-title">Service Title</h1>
            <p class="service-lead-text" id="srv-desc">Loading description...</p>

            <div class="features-box">
                <h3>What's Included in this Service:</h3>
                <div id="srv-features">
                    </div>
            </div>
        </div>

        <div class="right-media-column">
            <div class="sticky-media-wrapper">
                <img id="srv-image" src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=600&auto=format&fit=crop" alt="Digital Services Mockup" class="premium-service-mockup">
                
                <div class="lead-capture-form-card">
                    <h2 class="form-heading">Request a Custom Proposal</h2>
                    <form id="leadForm">
                        <div class="form-group-block">
                            <label class="form-label-text">Full Name *</label>
                            <input type="text" id="name" class="form-input-field" placeholder="Your Name" required>
                        </div>
                        <div class="form-group-block">
                            <label class="form-label-text">Email Address *</label>
                            <input type="email" id="email" class="form-input-field" placeholder="name@company.com" required>
                        </div>
                        <div class="form-group-block">
                            <label class="form-label-text">Selected Service</label>
                            <input type="text" id="form-service-name" class="form-input-field" readonly style="background: #e2e8f0; cursor: not-allowed;">
                        </div>
                        <div class="form-group-block">
                            <label class="form-label-text">Project Brief</label>
                            <textarea id="message" class="form-textarea-box" rows="4"></textarea>
                        </div>
                        <button type="submit" class="submit-proposal-btn">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const servicesData = {
            seo: {
    badge: "Organic Growth",
    title: "Search Engine Optimization",
    desc: "Dominate organic search results. Our advanced technical SEO frameworks, strategic content clusters, and authoritative link building accelerate qualified inbound funnels.",
    img: "./images/seo-banner.png",
    features: [
        "Comprehensive Keyword Intent Research",
        "On-Page & Technical Audit",
        "Authority Backlink Clusters",
        "Monthly Traffic Analytics Reports"
    ]
},
            ppc: {
                badge: "Performance Marketing",
                title: "Google Ads (PPC) Management",
                desc: "Maximize return on ad spend (ROAS). We design data-driven Search, Display, and Performance Max campaigns backed by absolute conversion tracking analytics.",
                img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=600&auto=format&fit=crop",
                features: ["Negative Keyword Campaign Mapping", "High-Converting Landing Pages", "Bid Strategy Optimization (tCPA/tROAS)", "Real-time Looker Studio Dashboard Setup"]
            },
            smm: {

                img: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=600&auto=format&fit=crop",
                features: ["Targeted Paid Ad Frameworks", "Content Calendar Strategy", "Community Engagement Design", "Influencer Campaign Management"]
            },
            webdev: {
                badge: "Development",
                title: "Website Development",
                desc: "High-conversion websites inspired by Framer and Webflow mechanics. Fast, fully responsive, and highly secure digital products customized to convert traffic.",
                img: "https://images.unsplash.com/photo-1547082299-de196ea013d6?q=80&w=600&auto=format&fit=crop",
                features: ["Clean Semantic HTML/CSS Architecture", "Framer & Webflow Speed Optimization", "Mobile-Responsive Breakpoints", "Advanced Lead Form Integrations"]
            },
            design: {
                badge: "Creative Assets",
                title: "Graphic Design Services",
                desc: "Premium marketing collaterals and high-impact visual design assets created intentionally to grab user attention across competitive market landscapes.",
                img: "https://images.unsplash.com/photo-1626785774573-4b799315345d?q=80&w=600&auto=format&fit=crop",
                features: ["Social Media Banner Designs", "Marketing Presentation Pitch decks", "Ad Creative Asset Generation", "Custom Visual Elements Layout"]
            },
            branding: {
                badge: "Identity Design",

                img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600&auto=format&fit=crop",

            },

            },

            },
            iso: {

            },
            msme: {

            },

                badge: "Government Tenders",
                title: "NSIC Registration Framework",
                desc: "Empower your manufacturing or commercial enterprise for large tenders with automated Single Point Registration System (SPRS) certification assistance.",
                img: "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=600&auto=format&fit=crop",
                features: ["SPRS Certification Assistance", "Government Tender Eligibility Setup", "Manufacturing/Commercial Audit Check", "Single Point Registration Flow"]
            },
            tollfree: {
                badge: "Infrastructure",
                title: "Toll Free Cloud Services",
                desc: "Instant consumer trust architecture. High-performance cloud-managed IVR infrastructure, virtual 1800-series numbers, and comprehensive call analytics.",
                img: "https://images.unsplash.com/photo-1596524430615-b46475ddff6e?q=80&w=600&auto=format&fit=crop",
                features: ["Cloud-Managed IVR Infrastructure", "Virtual 1800-Series Routing", "Real-Time Call Analytics Reports", "Custom Greeting Integration"]
            }
        };

        // 🔍 URL parameters reads here
        const urlParams = new URLSearchParams(window.location.search);
        const serviceKey = urlParams.get('service') || 'seo';

        // 🪄 Apply content inside fields
        if (servicesData[serviceKey]) {
            const data = servicesData[serviceKey];
            document.getElementById('srv-badge').innerText = data.badge;
            document.getElementById('srv-title').innerText = data.title;
            document.getElementById('srv-desc').innerText = data.desc;
            document.getElementById('form-service-name').value = data.title;
            
            // 🖼️ Dynamic Live Image URL Loader
            document.getElementById('srv-image').src = data.img;
            
            // Render features list
            let featuresHtml = '';
            data.features.forEach(feat => {
                featuresHtml += `<div class="feature-item"><span class="feature-icon">✓</span><span>${feat}</span></div>`;
            });
            document.getElementById('srv-features').innerHTML = featuresHtml;
            
            document.title = data.title + " - Right Ads";
        }
    </script>
    <script>

document.getElementById("leadForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    console.log("FORM SUBMITTED");

    const name = document.querySelector('input[type="text"]').value;
    const email = document.querySelector('input[type="email"]').value;
    const service = document.getElementById("form-service-name").value;
    const message = document.querySelector("textarea").value;

    console.log({name,email,service,message});

    const response = await fetch("http://localhost:5000/api/leads/submit", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            email,
            service,
            message
        })
    });

    console.log("RESPONSE:", response);

    const data = await response.json();

    console.log("DATA:", data);

    alert(data.message);
});

</script>
    <!-- <script src="script.js"></script> -->
    <script>
document.addEventListener("DOMContentLoaded", function () {

    const savedTheme = localStorage.getItem("theme");

    

    if(savedTheme === "dark"){
        document.body.classList.add("dark-mode");
    }

});
</script>
</body>
</html>

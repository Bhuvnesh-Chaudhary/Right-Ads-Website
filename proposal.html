<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Proposal - Right Ads</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background-color 0.3s ease, color 0.3s ease;
    background: #f8fafc;
    color: #0f172a;
    padding-top: 110px; /* Top Navbar bada kiya isliye body padding badha di */
}

/* ========================================================
   1. PREMIUM TOP NAVBAR (Height badha di aur Clean kiya)
   ======================================================== */
.proposal-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 95px; /* Height 80px se badha kar 95px kar di */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    background: rgba(255, 255, 255, 0.8);
    border-bottom: 1px solid rgba(15, 23, 42, 0.06);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
    transition: all 0.3s ease;
}

.nav-container {
    width: 100%;
    max-width: 1200px;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo-img {
    height: 110px; /* Logo ka size bada aur premium kiya */
    width: 400px;
    object-fit: contain;
    display: block;
    transition: transform 0.3s ease;
}

.logo-img:hover {
    transform: scale(1.03);
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #0f172a;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 20px 30px; /* Button bada kiya */
    border-radius: 50px;
    background: rgba(15, 23, 42, 0.05);
    border: 1px solid rgba(15, 23, 42, 0.05);
    transition: all 0.3s ease;
}

.back-btn:hover {
    background: #2563eb;
    color: #ffffff;
    border-color: #2563eb;
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
    transform: translateY(-2px);
}

/* ========================================================
   2. PREMIUM VERTICAL SIDEBAR (Right Shift aur Top Adjust)
   ======================================================== */
.vertical-navbar, .side-navbar {
    position: fixed;
    left: 40px; /* Thoda right ki taraf khiska diya pehle se */
    top: 120px; /* Top Navbar ke exact neeche set kiya taaki chupe nahi */
    width: 250px;
    height: calc(100vh - 150px); /* Height auto adjusted */
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    z-index: 999;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(15, 23, 42, 0.06);
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.04);
    transition: all 0.3s ease;
}

.vertical-logo {
    padding: 25px 20px;
    display: flex;
    justify-content: center;
}

.vertical-menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 16px;
    flex: 1;
}

.vertical-menu a {
    text-decoration: none;
    padding: 14px 18px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 15px;
    color: #475569;
    transition: all 0.25s ease;

    /* --- NAYA BORDER CODE (LIGHT MODE) --- */
    border: 1px solid rgba(15, 23, 42, 0.08); /* Ekdum subtle elegant border */
    margin-bottom: 4px; /* Buttons ke beech thoda gap taaki borders overlap na karein */
}

.vertical-menu a:hover {
    background: rgba(37, 99, 235, 0.06);
    color: #2563eb;
    transform: translateX(6px);
}

.vertical-menu a.active {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #ffffff !important;
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.15);
}

/* Sidebar ke sath layout automatic perfect balance rahega */
.page-content {
    margin-left: 320px;
    width: calc(100% - 320px);
    padding: 40px;
}

/* ========================================================
   3. FORM STRUCTURE
   ======================================================== */
.proposal-container {
    width: 100%;
    max-width: 680px;
    margin: 40px auto;
    padding: 0 20px;
}

.form-wrapper-container {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
    padding: 40px;
    border-radius: 24px;
    transform-origin: center center;
    animation: premiumReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.page-heading h1 {
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 24px;
    color: #0f172a;
}

.page-heading p { color: #64748b; font-size: 15px; }
.form-input-group { margin-bottom: 24px; }
.form-field-label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }

.form-field-input,
.form-field-select,
.form-field-textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    background: #ffffff !important;
    color: #0f172a !important;
    border: 1px solid #cbd5e1;
}

.form-field-input:focus,
.form-field-select:focus,
.form-field-textarea:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.form-submit-action-btn {
    width: 100%;
    border: none;
    background: #2563eb;
    color: white;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
}

/* ========================================================
4. 🌟 DARK MODE SHIFTS (Anti-Overlap Guard)
   ======================================================== */
body.dark-mode {
    /* Main Home Page ka exact premium dark navy blue color */
    background: #0b1120 !important;
    color: #f8fafc;
}

body.dark-mode .proposal-navbar {
    /* Navbar ko main background se dynamic transparent match kiya */
    background: rgba(11, 17, 32, 0.8);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

body.dark-mode .back-btn {
    color: #f8fafc;
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.05);
}

body.dark-mode .back-btn:hover {
    background: #3b82f6;
    border-color: #3b82f6;
}

body.dark-mode .vertical-navbar, body.dark-mode .side-navbar {
    /* Left sidebar thoda sa solid layer overlay premium look ke liye */
    background: rgba(17, 24, 43, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
}

body.dark-mode .vertical-menu a {
    color: #94a3b8;
}

body.dark-mode .vertical-menu a:hover {
    background: rgba(59, 130, 246, 0.08);
    color: #3b82f6;
}

body.dark-mode .vertical-menu a.active {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
}

body.dark-mode .form-wrapper-container {
    /* Form card thoda sa light navy shade taaki screen depth professional lage */
    background: #111a2e;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

body.dark-mode .page-heading h1 {
    color: #ffffff;
}

body.dark-mode .form-field-label {
    color: #cbd5e1;
}

body.dark-mode .form-field-input,
body.dark-mode .form-field-select,
body.dark-mode .form-field-textarea {
    /* Form inputs ka inner background exact pure body color se overlap kiya */
    background: #0b1120 !important;
    color: #ffffff !important;
    border: 1px solid rgba(255, 255, 255, 0.08);
}

body.dark-mode .form-submit-action-btn {
    background: #3b82f6;
}

/* ========================================================
   5. RESPONSIVENESS & ANIMATIONS
   ======================================================== */
@keyframes premiumReveal {
    0% { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(4px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

@media (max-width: 1100px) {
    .vertical-navbar, .side-navbar { display: none; }
    .page-content { margin-left: 0; width: 100%; padding: 20px; }
}

/* Actions Wrapper Alignment */
.nav-actions {
    display: flex;
    align-items: center;
    gap: 16px; /* Dono buttons ke beech spacing */
}

/* Theme Button Base Design */
.theme-toggle-btn {
    background: rgba(15, 23, 42, 0.05);
    border: 1px solid rgba(15, 23, 42, 0.05);
    color: #0f172a;
    width: 44px;
    height: 44px;
    border-radius: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s ease;
}

.theme-toggle-btn:hover {
    background: rgba(15, 23, 42, 0.1);
    transform: scale(1.05);
}

/* Icon visibility setup */
.theme-toggle-btn .sun-icon { display: none; }  /* Default Light mode mein moon dikhega */
.theme-toggle-btn .moon-icon { display: block; }

/* --- DARK MODE SHIFTS FOR TOGGLE BUTTON --- */
body.dark-mode .theme-toggle-btn {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.05);
    color: #f8fafc;
}

body.dark-mode .theme-toggle-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}

/* Dark mode aane par icons swap ho jayenge */
body.dark-mode .theme-toggle-btn .sun-icon { display: block; }
body.dark-mode .theme-toggle-btn .moon-icon { display: none; }
</style>

<script src="script.js"></script>

<script>
    const logoImg = document.getElementById("navbar-logo");

    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark-mode");
        logoImg.src = "images/logo-dark.png"; // Dark mode logo path
    } else {
        document.body.classList.remove("dark-mode");
        logoImg.src = "images/logo.png"; // Light mode logo path
    }
    const themeToggleBtn = document.getElementById('theme-toggle-btn');

themeToggleBtn.addEventListener('click', () => {
    // Body par dark-mode class toggle karein
    document.body.classList.toggle('dark-mode');
    
    // User ki choice ko localStorage mein save karein taaki page refresh par change na ho
    if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
    } else {
        localStorage.setItem('theme', 'light');
    }
});

// Page load hote hi check karein ki user ne pehle kya select kiya tha
window.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
    }
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Proposal - Right Ads</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- LIGHT MODE COLORS (DEFAULT) --- */
        body {
            background: #f8fafc;
            color: #0f172a;
        }

        /* Nav Bar Setup */
        .proposal-navbar {
    width: 100%;
    background: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    padding: 10px 0; /* Padding thoda kam kiya taaki bada logo fit aaye */
    display: flex;
    justify-content: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

        /* Nav container jo form ke size (700px) se align rahega */
        .nav-container {
            width: 100%;
            max-width: 700px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        /* Logo size bada kiya */
        .logo-img {
    height: 85px; /* 65px se badha kar 85px kar diya hai ekdum solid look ke liye */
    width: auto;
    max-width: 100%; /* Mobile screen par wrap hone ke liye */
    object-fit: contain;
    display: block;
}
@media (max-width: 600px) {
    .logo-img {
        height: 60px; /* Mobile par thoda adjust kiya taaki bar burst na ho */
    }
    .proposal-navbar {
        padding: 5px 0;
    }
}

        .form-wrapper-container {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .page-heading h1 {
            color: #0f172a;
        }

        .page-heading p {
            color: #64748b;
        }

        .form-field-label {
            color: #0f172a;
        }

        .form-field-input,
        .form-field-select,
        .form-field-textarea {
            background: #ffffff !important;
            color: #0f172a !important;
            border: 1px solid #cbd5e1;
        }

        .back-btn {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #1d4ed8;
        }


        /* --- DARK MODE COLORS --- */
        body.dark-mode {
            background: #0b0f19;
            color: #f8fafc;
        }

        body.dark-mode .proposal-navbar {
            background: #111827;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body.dark-mode .form-wrapper-container {
            background: linear-gradient(135deg, #1e293b 0%, #111827 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body.dark-mode .page-heading h1 {
            color: #ffffff;
        }

        body.dark-mode .page-heading p {
            color: #94a3b8;
        }

        body.dark-mode .form-field-label {
            color: #ffffff;
        }

        body.dark-mode .form-field-input,
        body.dark-mode .form-field-select,
        body.dark-mode .form-field-textarea {
            background: #0b0f19 !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .form-field-input:focus,
        body.dark-mode .form-field-select:focus,
        body.dark-mode .form-field-textarea:focus {
            border-color: #60a5fa;
        }

        body.dark-mode .back-btn {
            color: #60a5fa;
        }

        body.dark-mode .back-btn:hover {
            color: #93c5fd;
        }


        /* --- STRUCTURAL LAYOUT STYLES --- */
        .proposal-container {
            width: 100%;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-wrapper-container {
            padding: 40px;
            border-radius: 24px;
        }

        .page-heading {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-heading h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .form-input-group {
            margin-bottom: 20px;
        }

        .form-field-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-field-input,
        .form-field-select,
        .form-field-textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        .form-action-container {
            margin-top: 25px;
        }

        .form-submit-action-btn {
            width: 100%;
            border: none;
            background: #2563eb;
            color: white;
            padding: 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        body.dark-mode .form-submit-action-btn {
            background: #3b82f6;
        }

        .form-submit-action-btn:hover {
            background: #1d4ed8;
        }

        body.dark-mode .form-submit-action-btn:hover {
            background: #2563eb;
        }

        /* Bug Override */
        body.dark-mode .form-field-select,
        .form-field-select {
            background-image: none !important;
            appearance: select !important;
            -webkit-appearance: select !important;
            -moz-appearance: select !important;
            background-repeat: no-repeat !important;
        }

        @media (max-width: 600px) {
            .logo-img {
                height: 50px;
            }
        }
        /* ... baki saari CSS upar rahegi ... */

        /* Bug Override (Jo pehle kiya tha) */
        body.dark-mode .form-field-select,
        .form-field-select {
            background-image: none !important;
            appearance: select !important;
            -webkit-appearance: select !important;
            -moz-appearance: select !important;
            background-repeat: no-repeat !important;
        }

        @media (max-width: 600px) {
            .logo-img {
                height: 50px;
            }
        }

        /* --- YAHAN PASTE KAR DE BHAI (TUMHARA NEW ANIMATION CODE) --- */
        .form-wrapper-container {
            transform-origin: center center;
            animation: premiumReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: transform, opacity, filter;
        }

        .proposal-navbar {
            animation: navSlideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes premiumReveal {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes navSlideDown {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style> </head>
    </style>
</head>
<body>

<nav class="proposal-navbar">
    <div class="nav-container">
        <div class="logo-container">
            <a href="index.html">
                <img id="navbar-logo" src="images/logo.jpg" alt="Right Ads Logo" class="logo-img">
            </a>
        </div>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
</nav>

<div class="proposal-container">
    <div class="form-wrapper-container">
        <div class="page-heading">
            <h1>Get Proposal</h1>
            <p>Tell us about your project and we'll get back to you.</p>
        </div>

        <form action="#" method="POST" class="agency-lead-capture-form">
            <div class="form-input-group">
                <label for="form-user-name" class="form-field-label">Full Name *</label>
                <input type="text" id="form-user-name" class="form-field-input" required>
            </div>

            <div class="form-input-group">
                <label for="form-user-email" class="form-field-label">Email Address *</label>
                <input type="email" id="form-user-email" class="form-field-input" required>
            </div>

            <div class="form-input-group">
                <label for="form-user-phone" class="form-field-label">Phone Number *</label>
                <input type="tel" id="form-user-phone" class="form-field-input" required>
            </div>

            <div class="form-input-group">
                <label for="form-service-selection" class="form-field-label">Service Required *</label>
                <select id="form-service-selection" class="form-field-select" required>
                    <option value="" disabled selected>Select Service</option>
                    <option>Search Engine Optimization (SEO)</option>
                    <option>Google Ads & Paid PPC</option>
                    <option>Social Media Marketing</option>
                    <option>Premium Website Development</option>
                    <option>Corporate Identity & Branding</option>
                    <option>ISO/MSME/NSIC Certifications</option>
                    <option>Other Growth Infrastructures</option>
                </select>
            </div>

            <div class="form-input-group">
                <label for="form-user-message" class="form-field-label">Project Brief</label>
                <textarea id="form-user-message" class="form-field-textarea" rows="5"></textarea>
            </div>

            <div class="form-action-container">
                <button type="submit" class="form-submit-action-btn">
                    Send Message
                </button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>

<script>
    const logoImg = document.getElementById("navbar-logo");

    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark-mode");
        logoImg.src = "images/logo-dark.jpeg"; // Dark mode logo path
    } else {
        document.body.classList.remove("dark-mode");
        logoImg.src = "images/logo.jpg"; // Light mode logo path
    }
</script>

</body>
</html>
